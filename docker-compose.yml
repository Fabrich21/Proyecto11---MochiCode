version: '3.9'

services:
  # TimescaleDB: extensión de series temporales sobre PostgreSQL 16
  database:
    image: timescale/timescaledb:latest-pg16
    container_name: proyecto11_timescale
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-proyecto11}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script ejecutado automáticamente en la primera creación del contenedor
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    networks:
      - p11_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-proyecto11}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis para la ingesta masiva y alta concurrencia
  cache:
    image: redis:7-alpine
    container_name: proyecto11_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - p11_network

networks:
  p11_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: